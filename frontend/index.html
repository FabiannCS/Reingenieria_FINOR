<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reingenieria-CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/zephyr/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="bi bi-people-fill me-2"></i>Gestión de Clientes
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row align-items-center mb-4">
            <div class="col-md-4">
                <h2 class="fw-bold mb-0 text-dark">DataTable</h2>
            </div>
            <div class="col-md-8 text-md-end d-flex justify-content-md-end align-items-center gap-3 mt-3 mt-md-0">
                <div style="min-width: 200px;">
                    <select id="filtroEstado" class="form-select border-primary shadow-sm">
                        <option value="Todos">Mostrar Todos</option>
                        <option value="activo">Solo Activos</option>
                        <option value="Inactivo">Solo Inactivos</option>
                    </select>
                </div>
                <button class="btn btn-primary rounded-pill shadow-sm px-4" id="nuevoCliente">
                    <i class="bi bi-plus-circle me-1"></i> Nuevo Cliente
                </button>
            </div>
        </div>

        <div class="card shadow-lg border-0 rounded-4 mb-5">
            <div class="card-body p-4">
                <table id="tablaClientes" class="table table-hover align-middle" style="width: 100%">
                    <thead class="table-light">
                        <tr>
                            <th class="text-dark fw-bold">ID</th>
                            <th class="text-dark fw-bold">Nombre</th>
                            <th class="text-dark fw-bold">Apellido</th>
                            <th class="text-dark fw-bold">Teléfono</th>
                            <th class="text-dark fw-bold">Fecha Registro</th>
                            <th class="text-dark fw-bold">Estado</th>
                            <th class="text-dark fw-bold">Opciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header bg-primary text-white rounded-top-4">
                    <h5 class="modal-title fw-bold" id="modalTitulo"><i class="bi bi-person-plus me-2"></i>Nuevo Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formCliente">
                        <input type="hidden" id="clienteId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nombre" class="form-label text-muted small fw-bold">Nombre</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="apellido" class="form-label text-muted small fw-bold">Apellido</label>
                                <input type="text" class="form-control" id="apellido" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="telefono" class="form-label text-muted small fw-bold">Teléfono</label>
                            <input type="text" class="form-control" id="telefono" required>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label text-muted small fw-bold">Fecha Registro</label>
                            <input type="datetime-local" class="form-control" id="date" required>
                        </div>
                        <div class="mb-4">
                            <label for="estado" class="form-label text-muted small fw-bold">Estado</label>
                            <select class="form-select" id="estado" required>
                                <option value="activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 bg-light rounded-bottom-4">
                    <button type="button" class="btn btn-light text-dark rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="btnGuardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/cliente.js"></script>
</body>
</html>
